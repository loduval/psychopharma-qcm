<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=3.0"><title>Session 5 — Addictions Medicaments — M7</title><style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap');
:root{
  --bg:#070b14;--s:#0e1425;--c:#141d32;--c2:#1a2540;
  --a:#6b9fff;--a2:#9b87f5;--am:#f5a623;--g:#3ecf7a;
  --t:#e2e8ff;--m:#7a90bf;--b:#1e2d4a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--t);
  font-size:15px;line-height:1.75;max-width:740px;margin:0 auto;}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:200;background:rgba(7,11,20,.96);
  backdrop-filter:blur(16px);border-bottom:1px solid var(--b);
  display:flex;align-items:center;gap:10px;padding:10px 16px;flex-wrap:wrap;}
.tb-back{background:var(--c2);border:1px solid var(--b);color:var(--m);
  border-radius:8px;padding:5px 12px;font-size:12px;
  font-family:inherit;text-decoration:none;white-space:nowrap;}
.tb-crumb{font-size:12px;color:var(--m);flex:1;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tb-crumb em{color:var(--a);font-style:normal;font-weight:600;}

/* ── HERO ── */
.sess-hero{padding:24px 20px 18px;
  background:linear-gradient(135deg,var(--s),var(--c));
  border-bottom:1px solid var(--b);}
.sh-tag{font-size:10px;font-weight:800;text-transform:uppercase;
  letter-spacing:.12em;color:var(--a2);margin-bottom:6px;}
.sess-hero h1{font-family:'Crimson Pro',Georgia,serif;font-size:26px;
  font-weight:700;line-height:1.3;margin-bottom:8px;}
.sh-meta{font-size:12px;color:var(--m);}

/* ── NAVIGATION COURS (accordéon) ── */
.cours-nav{background:var(--s);border-bottom:1px solid var(--b);
  padding:10px 16px;}
.cn-title{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--m);margin-bottom:6px;}
.cn-links{display:flex;gap:6px;flex-wrap:wrap;}
.cn-link{background:var(--c);border:1px solid var(--b);color:var(--m);
  border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;
  text-decoration:none;cursor:pointer;white-space:nowrap;}
.cn-link:hover{background:var(--a);color:#fff;border-color:var(--a);}

/* ── RÉSUMÉ ── */
.resume-block{margin:16px;background:var(--c);border:1px solid var(--b);
  border-left:4px solid var(--a2);border-radius:12px;padding:18px 20px;}
.resume-tag{font-size:10px;font-weight:800;text-transform:uppercase;
  letter-spacing:.1em;color:var(--a2);margin-bottom:12px;
  display:flex;align-items:center;gap:6px;}
.resume-tag::before{content:'✦';}
.resume-block h3{font-family:'Crimson Pro',Georgia,serif;font-size:19px;
  font-weight:700;color:#fff;margin:14px 0 6px;}
.resume-block h3:first-child{margin-top:0;}
.resume-block h4{font-size:14px;font-weight:700;color:var(--a);margin:10px 0 4px;}
.resume-block p{font-size:13px;color:var(--t);line-height:1.7;margin:4px 0;}
.resume-block ul{padding-left:18px;margin:4px 0 8px;}
.resume-block li{font-size:13px;color:var(--t);line-height:1.7;margin:2px 0;}
.resume-block strong{color:#fff;font-weight:700;}

/* ── COURS BLOCK ── */
.cours-section{border-top:2px solid var(--b);margin-top:6px;}
.cours-head{padding:14px 20px 10px;cursor:pointer;
  display:flex;align-items:center;gap:10px;
  background:rgba(107,159,255,.04);}
.cours-head:hover{background:rgba(107,159,255,.08);}
.ch-num{font-size:9px;font-weight:800;text-transform:uppercase;
  letter-spacing:.1em;color:var(--a);flex-shrink:0;}
.ch-title{font-family:'Crimson Pro',Georgia,serif;font-size:19px;
  font-weight:700;line-height:1.3;flex:1;}
.ch-meta{font-size:10px;color:var(--m);white-space:nowrap;}
.ch-toggle{color:var(--m);font-size:18px;transition:transform .2s;flex-shrink:0;}
.cours-section.open .ch-toggle{transform:rotate(90deg);}
.slides-wrap{display:none;padding:0 14px 16px;}
.cours-section.open .slides-wrap{display:block;}

/* ── SLIDES ── */
.slide-card{background:var(--c);border-radius:10px;
  border-left:3px solid var(--b);margin-bottom:8px;padding:11px 13px;}
.slide-card.top{border-left-color:var(--a);}
.slide-card.has-img{border-left-color:var(--am);}
.sn{font-size:9px;font-weight:800;text-transform:uppercase;
  letter-spacing:.1em;color:var(--m);margin-bottom:6px;}
.t-h1{font-family:'Crimson Pro',Georgia,serif;font-size:19px;
  font-weight:700;color:#fff;line-height:1.35;margin:3px 0 5px;}
.t-h2{font-family:'Crimson Pro',Georgia,serif;font-size:16px;
  font-weight:600;color:#c5d3f0;margin:3px 0 4px;}
.t-sm{font-size:11px;color:var(--m);margin:2px 0;}

/* ── IMAGES ── */
.med-fig{margin:12px 0;border:1px solid var(--b);border-radius:10px;
  overflow:hidden;cursor:zoom-in;}
.med-fig img{width:100%;height:auto;display:block;background:#fff;}
.med-fig figcaption{font-size:10px;color:var(--m);padding:5px 10px;
  background:var(--c2);border-top:1px solid var(--b);font-style:italic;}

/* ── LIGHTBOX ── */
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.94);
  z-index:500;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;padding:16px;}
#lb.open{display:flex;}
#lbi{max-width:92vw;max-height:85vh;object-fit:contain;
  border-radius:8px;background:#fff;}
.lbx{position:fixed;top:14px;right:18px;color:#fff;font-size:28px;
  cursor:pointer;width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;}

/* ── NAV BAS ── */
.bot-nav{display:flex;justify-content:space-between;align-items:center;
  padding:12px 18px;border-top:1px solid var(--b);
  background:rgba(7,11,20,.97);backdrop-filter:blur(16px);
  position:sticky;bottom:0;}
.bn-btn{background:var(--c2);border:1px solid var(--b);color:var(--m);
  border-radius:10px;padding:8px 14px;font-size:12px;font-weight:600;
  font-family:inherit;text-decoration:none;}
.bn-btn:hover{border-color:var(--a);color:var(--a);}
.bn-info{font-size:11px;color:var(--m);text-align:center;}
</style></head><body><div class="topbar"><a class="tb-back" href="../../../DIVERS/_INDEX/SYNTHESES_v6.html">← Module 7</a><div class="tb-crumb">M7 · <em>Session 5 — Addictions Medicaments</em></div></div><div class="sess-hero"><div class="sh-tag">Module 7 — Session 5/5</div><h1>Session 5 — Addictions Medicaments</h1><div class="sh-meta">0 cours · 0 images médicales validées</div></div><div class="cours-nav"><div class="cn-title">Cours de cette session</div><div class="cn-links"></div></div><div class="resume-block"><div class="resume-tag">Résumé de la session</div><p><em>Résumé non demandé.</em></p></div><div class="bot-nav"><a class="bn-btn" href="../SESSION_4_ADDICTIONS_COMPORTEMENTALES/index.html">← Session préc.</a><div class="bn-info">Session 5/5<br>Module 7</div><span></span></div><div id="lb"><span class="lbx" onclick="document.getElementById('lb').classList.remove('open')">✕</span><img id="lbi" src="" alt="Schéma médical"></div><script>
function openLB(src) {
  document.getElementById('lbi').src = src;
  document.getElementById('lb').classList.add('open');
}
function toggleCours(el) {
  el.closest('.cours-section').classList.toggle('open');
}
// Ouvrir tous les cours par défaut
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.cours-section').forEach(function(s) {
    s.classList.add('open');
  });
  document.getElementById('lb').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') document.getElementById('lb').classList.remove('open');
  });
});
</script></body></html>
